<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Army Planner">
<meta name="theme-color" content="#0b0a14">
<title>플래너</title>
<style>
:root {
  --safe-t: env(safe-area-inset-top);
  --safe-b: env(safe-area-inset-bottom);
  --safe-l: env(safe-area-inset-left);
  --safe-r: env(safe-area-inset-right);
  --nav: 78px;
}

/* RESET */
html {
  height: -webkit-fill-available;
  background: var(--bg);
}

body {
  margin: 0;
  min-height: 100vh;
  min-height: -webkit-fill-available;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
  overflow: hidden;
  position: relative;
}

/* 🔥 iOS PWA 하단 공백 제거 핵심 */
body::after {
  content: '';
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  height: env(safe-area-inset-bottom);
  background: var(--bg);
  z-index: 9999;
  pointer-events: none;
}

/* 앱 컨테이너 */
#app {
  position: relative;
  width: 100%;
  height: 100vh;
  height: -webkit-fill-available;
  overflow: hidden;
  background: var(--bg);
}

/* 페이지 */
.page {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
}

/* 스크롤 영역 */
.scroll {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;

  padding:
    16px
    calc(18px + var(--safe-r))
    calc(var(--nav) + var(--safe-b) + 20px)
    calc(18px + var(--safe-l));
}

/* 하단 네비 */
.nav {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;

  background: rgba(11, 10, 22, 0.96);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);

  border-top: 1px solid var(--border);

  display: flex;
  align-items: flex-start;

  padding-top: 8px;
  padding-bottom: calc(env(safe-area-inset-bottom) + 8px);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);

  z-index: 500;
}
</style>
</head>
<body>
<div id="app">
  <div class="page active" id="page-today">
    <div class="topbar">
      <div class="topbar-eyebrow" id="today-eyebrow">...</div>
    </div>
    <div class="scroll" id="today-scroll"></div>
  </div>
  <div class="page" id="page-results">
    <div class="topbar">
      <div class="topbar-eyebrow">통계</div>
      <div class="topbar-title">결산</div>
    </div>
    <div class="scroll" id="results-scroll"></div>
  </div>
  <div class="page" id="page-settings">
    <div class="topbar">
      <div class="topbar-eyebrow">관리</div>
      <div class="topbar-title">설정</div>
    </div>
    <div class="scroll" id="settings-scroll"></div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" id="nav-today" onclick="go('today')">
      <span class="nav-ico">☀️</span>
      <span class="nav-lbl">오늘</span>
    </button>
    <button class="nav-btn" id="nav-results" onclick="go('results')">
      <span class="nav-ico">📊</span>
      <span class="nav-lbl">결산</span>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="go('settings')">
      <span class="nav-ico">⚙️</span>
      <span class="nav-lbl">설정</span>
    </button>
  </nav>
  <div class="modal-bg" id="modal-bg" onclick="onBgClick(event)">
    <div class="modal-sheet">
      <div class="modal-handle-w"><div class="modal-handle"></div></div>
      <div id="modal-inner"></div>
    </div>
  </div>
</div>
<script>
const KEY = 'gaengsaeng_v4';
const FEX = [
  { id:'run',    name:'뜀걸음', unit:'km', step:0.5, def:3 },
  { id:'pullup', name:'턱걸이', unit:'개', step:1,   def:0 },
];
const DK = ['일','월','화','수','목','금','토'];
const MK = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const UNITS = ['개','분','km','세트','회'];
const STEPS = ['1','5','10','0.5','0.1'];

let D = {
  logs: {},
  cex: [],
  stu: [
    {id:'s1', name:'전공 공부'},
    {id:'s2', name:'영어 공부'},
  ]
};
let screen = 'today';

function uid() { return '_' + Math.random().toString(36).slice(2,9); }
function dk(off=0) {
  const d = new Date();
  d.setDate(d.getDate() + off);
  return d.toISOString().split('T')[0];
}
function monDates() {
  const t = new Date(), dow = t.getDay();
  const mon = new Date(t);
  mon.setDate(t.getDate() - (dow===0?6:dow-1));
  return Array.from({length:7},(_,i)=>{
    const d=new Date(mon); d.setDate(mon.getDate()+i); return d.toISOString().split('T')[0];
  });
}
function load() {
  try {
    const r=localStorage.getItem(KEY);
    if(r){ const p=JSON.parse(r);
      if(p.logs) D.logs=p.logs;
      if(p.cex) D.cex=p.cex;
      if(p.stu && p.stu.length>=2) D.stu=p.stu;
    }
  } catch(e){}
}
function save() {
  try { localStorage.setItem(KEY,JSON.stringify(D)); } catch(e){}
}
function log(d) { if(!D.logs[d]) D.logs[d]={}; return D.logs[d]; }
function allIds() {
  return [...FEX.map(e=>e.id),...D.cex.map(e=>e.id),...D.stu.map(s=>s.id)];
}
function dayPct(d) {
  const l=D.logs[d]||{}, ids=allIds();
  if(!ids.length) return 0;
  return ids.filter(id=>l[id]?.done).length / ids.length;
}
function streak() {
  let s=0;
  const tl=D.logs[dk(0)]||{};
  if(Object.values(tl).some(v=>v?.done)) s++;
  let off=1;
  while(off<=365){
    const l=D.logs[dk(-off)]||{};
    if(!Object.values(l).some(v=>v?.done)) break;
    s++; off++;
  }
  return s;
}
function bestStreak() {
  const dks=Object.keys(D.logs).sort();
  let best=0,cur=0,prev=null;
  for(const d of dks){
    const has=Object.values(D.logs[d]).some(v=>v?.done);
    if(has){
      cur = prev && (new Date(d)-new Date(prev))/864e5===1 ? cur+1 : 1;
      best=Math.max(best,cur); prev=d;
    } else { cur=0; prev=d; }
  }
  return best;
}
function totalDays() {
  return Object.keys(D.logs).filter(d=>Object.values(D.logs[d]).some(v=>v?.done)).length;
}
function exById(id) { return [...FEX,...D.cex].find(e=>e.id===id); }
function fmtVal(v,u) { return u==='km' ? v+'km' : v+u; }

function go(s) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+s).classList.add('active');
  document.getElementById('nav-'+s).classList.add('active');
  screen=s;
  if(s==='today') renderToday();
  else if(s==='results') renderResults();
  else renderSettings();
}

function renderToday() {
  const todayDk = dk(0);
  const l = log(todayDk);
  const ids = allIds();
  const done = ids.filter(id=>l[id]?.done).length;
  const total = ids.length;
  const pct = total ? done/total : 0;
  const pctInt = Math.round(pct*100);
  const allDone = pct===1 && total>0;
  const str = streak();
  const now = new Date();
  document.getElementById('today-eyebrow').textContent =
    `${now.getFullYear()}년 ${MK[now.getMonth()]} ${now.getDate()}일 ${DK[now.getDay()]}요일`;
  const R = 33, C = 2*Math.PI*R;
  const off = C*(1-pct);
  const strokeColor = pct===0?'var(--border)':pct===1?'#f0c060':'var(--gold)';
  let html = `
    <div class="topbar-title" style="margin-bottom:18px;padding:0 2px">오늘</div>
    <div class="hero">
      <div class="hero-left">
        <div class="hero-date">${now.getMonth()+1}월 ${now.getDate()}일</div>
        <div class="streak-pill">🔥 ${str}일 연속</div>
      </div>
      <div class="ring">
        <svg width="76" height="76" viewBox="0 0 76 76">
          <circle class="ring-track" cx="38" cy="38" r="${R}"/>
          <circle class="ring-fill" cx="38" cy="38" r="${R}"
            stroke="${strokeColor}"
            stroke-dasharray="${C.toFixed(2)}"
            stroke-dashoffset="${off.toFixed(2)}"/>
        </svg>
        <div class="ring-label">
          <div class="ring-pct">${pctInt}%</div>
          <div class="ring-sub">${done}/${total}</div>
        </div>
      </div>
    </div>
    ${allDone ? `
    <div class="done-banner">
      <div class="done-banner-ico">🎉</div>
      <div>
        <div class="done-banner-text">오늘 완료!</div>
        <div class="done-banner-sub">잘했어. 오늘 하루도 수고했어.</div>
      </div>
    </div>` : ''}
    <div class="sec">
      <div class="sec-hd"><div class="sec-lbl">운동</div></div>
      ${FEX.map(ex=>exCard(ex,l,todayDk,false)).join('')}
      ${D.cex.map(ex=>exCard(ex,l,todayDk,true)).join('')}
      <button class="add-btn" onclick="openModal('add-ex')">＋ 운동 추가</button>
    </div>
    <div class="sec">
      <div class="sec-hd"><div class="sec-lbl">공부</div></div>
      ${D.stu.map(s=>stuCard(s,l,todayDk)).join('')}
      <button class="add-btn" onclick="openModal('add-study')">＋ 과목 추가</button>
    </div>
  `;
  document.getElementById('today-scroll').innerHTML = html;
}

function exCard(ex, l, todayDk, isCustom) {
  const entry = l[ex.id] || {done:false, val:ex.def||0};
  const done = entry.done;
  const val = entry.val !== undefined ? entry.val : (ex.def||0);
  return `
    <div class="card ${done?'done':''}" id="ec-${ex.id}">
      <div class="ex-row">
        <button class="ex-check" onclick="toggleEx('${todayDk}','${ex.id}')">✓</button>
        <div class="ex-info">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-sub">${ex.unit} 단위 · 스텝 ${ex.step}</div>
        </div>
        <div class="counter">
          <button class="cnt-btn" onclick="adjEx('${todayDk}','${ex.id}',-${ex.step})">−</button>
          <span class="cnt-val">${fmtVal(val,ex.unit)}</span>
          <button class="cnt-btn" onclick="adjEx('${todayDk}','${ex.id}',${ex.step})">+</button>
        </div>
        ${isCustom?`<button class="edit-btn" onclick="openModal('edit-ex','${ex.id}')">✎</button>`:''}
      </div>
    </div>`;
}

function stuCard(s, l, todayDk) {
  const done = !!(l[s.id]?.done);
  return `
    <div class="card ${done?'done':''}" onclick="toggleStu('${todayDk}','${s.id}')">
      <div class="st-row">
        <div class="st-check">✓</div>
        <div class="st-name">${s.name}</div>
        <button class="edit-btn" onclick="event.stopPropagation();openModal('edit-study','${s.id}')">✎</button>
      </div>
    </div>`;
}

function toggleEx(d, id) {
  const l=log(d), ex=exById(id);
  if(!l[id]) l[id]={done:false, val:ex?.def||0};
  l[id].done=!l[id].done;
  if(navigator.vibrate) navigator.vibrate(8);
  save(); renderToday();
}
function adjEx(d, id, delta) {
  const l=log(d), ex=exById(id);
  if(!l[id]) l[id]={done:false, val:ex?.def||0};
  l[id].val = Math.max(0, Math.round((l[id].val + delta)*100)/100);
  save(); renderToday();
}
function toggleStu(d, id) {
  const l=log(d);
  if(!l[id]) l[id]={done:false};
  l[id].done=!l[id].done;
  if(navigator.vibrate) navigator.vibrate(8);
  save(); renderToday();
}

function renderResults() {
  const str=streak(), best=bestStreak(), tot=totalDays();
  const wk=monDates(), todayDk=dk(0);
  const weekHtml = wk.map((d,i)=>{
    const p=dayPct(d), pi=Math.round(p*100);
    const isT=d===todayDk, isFull=p===1&&(D.logs[d]&&Object.keys(D.logs[d]).length>0), isPart=p>0&&p<1;
    const cls=isFull?'full':isPart?'partial':isT?'today':'';
    return `<div class="wday">
      <div class="wday-lbl">${DK[(i+1)%7]}</div>
      <div class="wday-dot ${cls}">${pi>0?pi+'%':isT?'·':''}</div>
    </div>`;
  }).join('');
  const wdks=monDates();
  const exIds=[...FEX.map(e=>e.id),...D.cex.map(e=>e.id)];
  const stIds=D.stu.map(s=>s.id);
  let exD=0,exT=0,stD=0,stT=0;
  for(const d of wdks){
    const l=D.logs[d]||{};
    exIds.forEach(id=>{exT++;if(l[id]?.done)exD++;});
    stIds.forEach(id=>{stT++;if(l[id]?.done)stD++;});
  }
  const exP=exT?Math.round(exD/exT*100):0;
  const stP=stT?Math.round(stD/stT*100):0;
  const allDks=Object.keys(D.logs);
  let tP=0,tD=0;
  allDks.forEach(d=>{const p=dayPct(d);if(p>0){tD++;tP+=p;}});
  const avgP=tD?Math.round(tP/tD*100):0;
  document.getElementById('results-scroll').innerHTML=`
    <div class="r-card">
      <div class="r-card-title">연속 달성</div>
      <div class="streak-hero">
        <div class="streak-big">${str}</div>
        <div>
          <div class="streak-info-lbl">일 연속 🔥</div>
          <div class="streak-info-sub">최고 기록: ${best}일</div>
        </div>
      </div>
    </div>
    <div class="r-card">
      <div class="r-card-title">이번 주</div>
      <div class="week-row">${weekHtml}</div>
    </div>
    <div class="r-card">
      <div class="r-card-title">이번 주 달성률</div>
      <div class="bar-r">
        <div class="bar-hd"><span class="bar-nm">🏃 운동</span><span class="bar-pc">${exP}%</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${exP}%"></div></div>
      </div>
      <div class="bar-r">
        <div class="bar-hd"><span class="bar-nm">📚 공부</span><span class="bar-pc">${stP}%</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${stP}%"></div></div>
      </div>
    </div>
    <div class="stats-g" style="margin-bottom:12px">
      <div class="stat"><div class="stat-val">${tot}</div><div class="stat-lbl">총 달성 일수</div></div>
      <div class="stat"><div class="stat-val">${avgP}%</div><div class="stat-lbl">평균 완료율</div></div>
      <div class="stat"><div class="stat-val">${str}</div><div class="stat-lbl">현재 연속</div></div>
      <div class="stat"><div class="stat-val">${best}</div><div class="stat-lbl">최고 연속</div></div>
    </div>
  `;
}

function renderSettings() {
  const fixedRows = FEX.map(ex=>`
    <div class="st-row-s">
      <div class="st-row-ico">🏃</div>
      <div class="st-row-info">
        <div class="st-row-name">${ex.name}</div>
        <div class="st-row-sub">${ex.unit} · 스텝 ${ex.step}</div>
      </div>
      <span class="fixed-tag">고정</span>
    </div>`).join('');
  const cexRows = D.cex.map(ex=>`
    <div class="st-row-s">
      <div class="st-row-ico">💪</div>
      <div class="st-row-info">
        <div class="st-row-name">${ex.name}</div>
        <div class="st-row-sub">${ex.unit} · 스텝 ${ex.step}</div>
      </div>
      <div class="st-row-acts">
        <button class="st-act-btn e" onclick="openModal('edit-ex','${ex.id}')">✎</button>
        <button class="st-act-btn d" onclick="delEx('${ex.id}')">✕</button>
      </div>
    </div>`).join('');
  const stuRows = D.stu.map((s,i)=>`
    <div class="st-row-s">
      <div class="st-row-ico">📚</div>
      <div class="st-row-info">
        <div class="st-row-name">${s.name}</div>
        ${i<2?'<div class="st-row-sub">기본 과목</div>':''}
      </div>
      <div class="st-row-acts">
        <button class="st-act-btn e" onclick="openModal('edit-study','${s.id}')">✎</button>
        ${D.stu.length>2?`<button class="st-act-btn d" onclick="delStu('${s.id}')">✕</button>`:''}
      </div>
    </div>`).join('');
  document.getElementById('settings-scroll').innerHTML=`
    <div class="settings-g">
      <div class="settings-g-title">운동 관리</div>
      ${fixedRows}${cexRows}
    </div>
    <button class="add-btn" onclick="openModal('add-ex')" style="margin-bottom:20px">＋ 운동 추가</button>
    <div class="settings-g">
      <div class="settings-g-title">공부 과목</div>
      ${stuRows}
    </div>
    <button class="add-btn" onclick="openModal('add-study')" style="margin-bottom:28px">＋ 과목 추가</button>
    <div class="danger-zone">
      <button class="danger-btn" onclick="openModal('confirm-reset')">모든 기록 초기화</button>
    </div>
    <div class="app-info">
      갱생 플래너 · v1.0<br>
      Safari → 공유 → 홈 화면에 추가 → 앱으로 사용
    </div>
  `;
}

function openModal(type, payload) {
  const inner = document.getElementById('modal-inner');
  if(type==='add-ex') {
    inner.innerHTML=`
      <div class="modal-title">운동 추가</div>
      <div class="m-label">운동 이름</div>
      <input class="m-input" id="m-name" placeholder="예: 플랭크, 스쿼트" maxlength="20" autocorrect="off" autocapitalize="off">
      <div class="m-label">단위</div>
      <div class="chip-row">${UNITS.map((u,i)=>`<button class="chip unit-chip${i===0?' sel':''}" onclick="selChip(this,'.unit-chip')">${u}</button>`).join('')}</div>
      <div class="m-label">스텝 (증가량)</div>
      <div class="chip-row">${STEPS.map((s,i)=>`<button class="chip step-chip${i===0?' sel':''}" onclick="selChip(this,'.step-chip')">${s}</button>`).join('')}</div>
      <div class="m-acts">
        <button class="m-btn primary" onclick="doAddEx()">추가하기</button>
        <button class="m-btn secondary" onclick="closeModal()">취소</button>
      </div>`;
    setTimeout(()=>document.getElementById('m-name')?.focus(),350);
  }
  else if(type==='edit-ex') {
    const ex=D.cex.find(e=>e.id===payload); if(!ex) return;
    inner.innerHTML=`
      <div class="modal-title">운동 수정</div>
      <div class="m-label">운동 이름</div>
      <input class="m-input" id="m-name" value="${ex.name}" maxlength="20" autocorrect="off" autocapitalize="off">
      <div class="m-label">단위</div>
      <div class="chip-row">${UNITS.map(u=>`<button class="chip unit-chip${u===ex.unit?' sel':''}" onclick="selChip(this,'.unit-chip')">${u}</button>`).join('')}</div>
      <div class="m-label">스텝 (증가량)</div>
      <div class="chip-row">${STEPS.map(s=>`<button class="chip step-chip${String(ex.step)===s?' sel':''}" onclick="selChip(this,'.step-chip')">${s}</button>`).join('')}</div>
      <div class="m-acts">
        <button class="m-btn primary" onclick="doEditEx('${payload}')">저장</button>
        <div class="m-divider"></div>
        <button class="m-btn danger" onclick="delEx('${payload}');closeModal()">삭제</button>
        <button class="m-btn secondary" onclick="closeModal()">취소</button>
      </div>`;
    setTimeout(()=>document.getElementById('m-name')?.focus(),350);
  }
  else if(type==='add-study') {
    inner.innerHTML=`
      <div class="modal-title">과목 추가</div>
      <div class="m-label">과목 이름</div>
      <input class="m-input" id="m-name" placeholder="예: 수학, 토익, 코딩" maxlength="20" autocorrect="off">
      <div class="m-acts">
        <button class="m-btn primary" onclick="doAddStu()">추가하기</button>
        <button class="m-btn secondary" onclick="closeModal()">취소</button>
      </div>`;
    setTimeout(()=>document.getElementById('m-name')?.focus(),350);
  }
  else if(type==='edit-study') {
    const s=D.stu.find(s=>s.id===payload); if(!s) return;
    inner.innerHTML=`
      <div class="modal-title">과목 수정</div>
      <div class="m-label">과목 이름</div>
      <input class="m-input" id="m-name" value="${s.name}" maxlength="20" autocorrect="off">
      <div class="m-acts">
        <button class="m-btn primary" onclick="doEditStu('${payload}')">저장</button>
        ${D.stu.length>2?`<div class="m-divider"></div><button class="m-btn danger" onclick="delStu('${payload}');closeModal()">삭제</button>`:''}
        <button class="m-btn secondary" onclick="closeModal()">취소</button>
      </div>`;
    setTimeout(()=>document.getElementById('m-name')?.focus(),350);
  }
  else if(type==='confirm-reset') {
    inner.innerHTML=`
      <div class="modal-title">정말 초기화할까?</div>
      <p style="color:var(--text2);font-size:14px;line-height:1.7;margin-bottom:24px">모든 기록, 운동, 과목이 삭제돼.<br>되돌릴 수 없어.</p>
      <div class="m-acts">
        <button class="m-btn danger" onclick="doReset()">초기화</button>
        <button class="m-btn secondary" onclick="closeModal()">취소</button>
      </div>`;
  }
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function onBgClick(e) { if(e.target===document.getElementById('modal-bg')) closeModal(); }
function selChip(btn, cls) {
  btn.closest('.chip-row').querySelectorAll(cls).forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}
function getChip(cls) { return document.querySelector(cls+'.sel')?.textContent||''; }
function doAddEx() {
  const name=document.getElementById('m-name')?.value.trim(); if(!name) return;
  const unit=getChip('.unit-chip')||'개';
  const step=parseFloat(getChip('.step-chip')||'1');
  D.cex.push({id:uid(),name,unit,step,def:0});
  save(); closeModal(); renderToday();
}
function doEditEx(id) {
  const name=document.getElementById('m-name')?.value.trim(); if(!name) return;
  const unit=getChip('.unit-chip')||'개';
  const step=parseFloat(getChip('.step-chip')||'1');
  const ex=D.cex.find(e=>e.id===id); if(ex){ex.name=name;ex.unit=unit;ex.step=step;}
  save(); closeModal(); if(screen==='today') renderToday(); else renderSettings();
}
function delEx(id) {
  D.cex=D.cex.filter(e=>e.id!==id);
  save(); if(screen==='today') renderToday(); else renderSettings();
}
function doAddStu() {
  const name=document.getElementById('m-name')?.value.trim(); if(!name) return;
  D.stu.push({id:uid(),name});
  save(); closeModal(); renderToday();
}
function doEditStu(id) {
  const name=document.getElementById('m-name')?.value.trim(); if(!name) return;
  const s=D.stu.find(s=>s.id===id); if(s) s.name=name;
  save(); closeModal(); if(screen==='today') renderToday(); else renderSettings();
}
function delStu(id) {
  if(D.stu.length<=2) return;
  D.stu=D.stu.filter(s=>s.id!==id);
  save(); if(screen==='today') renderToday(); else renderSettings();
}
function doReset() {
  D={logs:{},cex:[],stu:[{id:'s1',name:'전공 공부'},{id:'s2',name:'영어 공부'}]};
  save(); closeModal(); renderToday();
}

load();
renderToday();
</script>
</body>
</html>
